<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace Pairing</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <img class="logo" src="icon.png" alt="Extension icon">
        <div>
          <h1 id="titleText">Extension Pairing</h1>
          <p id="subtitleText" class="subtitle">Connect this browser to your mobile app.</p>
        </div>
      </header>

      <section class="card">
        <p id="statusText" class="status">Not connected.</p>
        <p id="countdownText" class="countdown hidden"></p>
        <div id="qrWrapper" class="qr-wrapper hidden">
          <div id="qrCode"></div>
          <p id="qrChunkInfo" class="qr-chunk-info hidden"></p>
        </div>
        <section id="answerSection" class="answer hidden">
          <p class="answer-title">Step 2: paste mobile answer payload</p>
          <textarea id="answerInput" class="answer-input" placeholder="Paste JSON answer from mobile app"></textarea>
          <div class="answer-actions">
            <button id="scanAnswerButton" class="button secondary">Scan Answer QR</button>
            <button id="connectButton" class="button secondary">Connect</button>
          </div>
          <section id="answerScanner" class="answer-scanner hidden">
            <video id="answerVideo" class="answer-video" autoplay playsinline muted></video>
            <p class="answer-hint">Point this camera to mobile answer QR.</p>
            <button id="stopScanButton" class="button secondary compact">Stop Scan</button>
          </section>
        </section>
        <section id="listingSection" class="listing hidden">
          <div class="listing-header">
            <h2 id="listingHeaderTitle" class="listing-title">Latest Listing</h2>
            <div class="listing-toolbar">
              <button id="fillListingButton" class="button secondary compact hidden">Fill Form</button>
              <button id="fillImagesButton" class="button secondary compact hidden">Upload Images</button>
              <button id="refreshListingButton" class="button secondary compact hidden">Refresh</button>
            </div>
          </div>
          <p id="relayStatusText" class="relay-status hidden"></p>
          <p id="listingEmptyText" class="listing-empty">No listing received yet.</p>
          <div id="listingContent" class="hidden">
            <p id="listingTitle" class="listing-name"></p>
            <p id="listingPrice" class="listing-meta"></p>
            <p id="listingCategory" class="listing-meta"></p>
            <p id="listingLocation" class="listing-meta"></p>
            <p id="listingDescription" class="listing-description"></p>
            <p id="listingImages" class="listing-meta"></p>
          </div>
        </section>
        <p id="errorText" class="error hidden"></p>
        <div class="actions">
          <button id="generateButton" class="button primary">Generate QR</button>
          <button id="disconnectButton" class="button danger hidden">Disconnect</button>
        </div>
      </section>
    </main>

    <script src="./node_modules/qrcodejs/qrcode.min.js"></script>
    <script type="module" src="popup.js"></script>
  </body>
</html>
